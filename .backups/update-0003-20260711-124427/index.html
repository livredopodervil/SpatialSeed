<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Spatial Seed</title><link rel="stylesheet" href="./style.css"><script type="importmap">{"imports":{"three":"./vendor/three.module.js","three/addons/":"./vendor/addons/"}}</script></head><body><canvas id="world"></canvas><header id="toolbar"><button data-mode="translate">Mover</button><button data-mode="rotate">Girar</button><button data-mode="scale">Escala central</button><button id="space">Mundo</button><button id="add-box">Caixa</button><button id="undo" disabled>Desfazer</button><button id="redo" disabled>Refazer</button><button id="reset">Câmera</button><span id="status">Carregando…</span></header><aside id="panel"><div class="panel-head"><strong id="name">Nenhum objeto</strong><span id="selection-state">∅</span></div><section><h3>Transformação</h3><div class="grid3"><label>X<input id="px" type="number" step="0.1"></label><label>Y<input id="py" type="number" step="0.1"></label><label>Z<input id="pz" type="number" step="0.1"></label></div><button id="apply-position">Aplicar posição</button></section><section><h3>Escala unilateral</h3><div class="grid3 face-grid"><button data-face="nx">−X</button><button data-face="ny">−Y</button><button data-face="nz">−Z</button><button data-face="px">+X</button><button data-face="py">+Y</button><button data-face="pz">+Z</button></div><label>Incremento<input id="face-step" type="number" step="0.1" min="0.01" value="0.5"></label><p class="help">A face escolhida se desloca; a face oposta permanece fixa.</p></section><section><h3>Material</h3><div class="grid2"><label>Cor<input id="color" type="color" value="#6699cc"></label><label>Opacidade<input id="opacity" type="number" min="0" max="1" step="0.05" value="1"></label></div><label>Textura<input id="texture-file" type="file" accept="image/*"></label><div class="grid2"><label>Repetição U<input id="repeat-u" type="number" step="0.1" value="1"></label><label>Repetição V<input id="repeat-v" type="number" step="0.1" value="1"></label><label>Offset U<input id="offset-u" type="number" step="0.05" value="0"></label><label>Offset V<input id="offset-v" type="number" step="0.05" value="0"></label><label>Rotação °<input id="texture-rotation" type="number" step="1" value="0"></label><label>Centro<input id="texture-center" value="0.5,0.5"></label></div><div class="row"><button id="apply-material">Aplicar material</button><button id="clear-texture">Remover textura</button></div></section><section><h3>Semântica</h3><label>Categoria<input id="category" value="objeto.geométrico"></label><label>Descrição<textarea id="description" rows="3"></textarea></label><label>Morfismos<textarea id="morphisms" rows="3" placeholder="tipo -> destino"></textarea></label><button id="apply-semantics">Aplicar metadados</button></section></aside><div id="hint">Toque no vazio: selecionar ∅ · pinça: dolly · Ctrl+Z/Ctrl+Y</div><script type="module" src="./main.js"></script></body></html>
