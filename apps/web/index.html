<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Spatial Seed Monorepo</title>
<link rel="stylesheet" href="./style.css">
<script type="importmap">
{
  "imports": {
    "three": "../../vendor/three.module.js",
    "three/addons/": "../../vendor/addons/"
  }
}
</script>
</head>
<body>
<canvas id="world"></canvas>

<header id="toolbar">
  <button data-transform="translate">Mover</button>
  <button data-transform="rotate">Girar</button>
  <button data-transform="scale">Escalar</button>
  <button id="space">Mundo</button>
  <button id="multi-select">Seleção: única</button>
  <button id="clear-selection">Selecionar ∅</button>
  <button id="add-box">Caixa</button>
  <button id="undo" disabled>Desfazer local</button>
  <button id="redo" disabled>Refazer local</button>
  <button id="review" disabled>Revisar proposta</button>
  <button id="structure">Estrutura</button>
  <span id="status">Inicializando…</span>
</header>

<aside id="selection-panel">
  <strong>Seleção do editor</strong>
  <div id="selection-content">∅</div>
</aside>

<aside id="outline" hidden>
  <header><strong>Estado regional</strong><button id="close-outline">×</button></header>
  <div id="outline-content"></div>
</aside>

<section id="review-panel" hidden>
  <header>
    <strong>Confirmar alterações do sandbox</strong>
    <button id="close-review">×</button>
  </header>
  <p>A confirmação publica a proposta na região autoritativa.</p>
  <pre id="review-content"></pre>
  <div class="actions">
    <button id="confirm-proposal">Confirmar proposta</button>
    <button id="cancel-proposal">Cancelar</button>
  </div>
</section>

<pre id="error-box" hidden></pre>
<script type="module" src="./main.js"></script>
</body>
</html>
